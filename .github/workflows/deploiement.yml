name: Branche de déploiement

# Régénère la branche `deploiement` (racine = uniquement les fichiers à mettre en
# ligne) à chaque changement runtime sur `main`. chenetulipe n'a qu'à télécharger
# cette branche en ZIP et l'envoyer sur son hébergement.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'tests/**'
      - 'tests_py/**'
      - '.github/**'
      - '.githooks/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.js'
      - 'sync.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploiement
  cancel-in-progress: true

jobs:
  exporter:
    name: Exporter le runtime vers la branche deploiement
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Construire et pousser la branche deploiement
        run: |
          set -e
          export GIT_AUTHOR_NAME="github-actions[bot]"
          export GIT_AUTHOR_EMAIL="github-actions[bot]@users.noreply.github.com"
          export GIT_COMMITTER_NAME="$GIT_AUTHOR_NAME"
          export GIT_COMMITTER_EMAIL="$GIT_AUTHOR_EMAIL"

          rm -rf /tmp/site && mkdir -p /tmp/site
          cp -r index.html scripts.html lecture.html dictionnaire.html apropos.html \
                css js img font data .nojekyll /tmp/site/

          cd /tmp/site
          git init -q
          git checkout -q -b deploiement
          git add -A
          git commit -q -m "chore: export runtime (${GITHUB_SHA::7})"
          git push -f \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            deploiement
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
