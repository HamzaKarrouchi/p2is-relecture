name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'tests/**'
      - 'tests_py/**'
      - '.githooks/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

# Permissions nécessaires au déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; annule les précédents en cours
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Construire l'artefact statique
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Préparer le site (fichiers statiques uniquement)
        run: |
          mkdir -p _site
          cp -r *.html css js img font data _site/
          touch _site/.nojekyll

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Téléverser l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Déployer sur Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déploiement
        id: deployment
        uses: actions/deploy-pages@v4
